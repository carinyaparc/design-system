<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--color-background);font-family:var(--font-sans);color:var(--color-foreground);padding:22px;box-sizing:border-box;}</style>
</head><body><div style="display:flex;gap:16px;align-items:center;">
<div style="text-align:center"><div style="width:64px;height:64px;background:var(--color-muted);border:1px solid #B7CDBD;border-radius:8px;"></div><div style="font-size:11px;color:var(--stone);margin-top:6px;">sm</div></div><div style="text-align:center"><div style="width:64px;height:64px;background:var(--color-muted);border:1px solid #B7CDBD;border-radius:16px;"></div><div style="font-size:11px;color:var(--stone);margin-top:6px;">md</div></div><div style="text-align:center"><div style="width:64px;height:64px;background:var(--color-muted);border:1px solid #B7CDBD;border-radius:24px;"></div><div style="font-size:11px;color:var(--stone);margin-top:6px;">lg</div></div><div style="text-align:center"><div style="width:64px;height:64px;background:var(--color-muted);border:1px solid #B7CDBD;border-radius:999px;"></div><div style="font-size:11px;color:var(--stone);margin-top:6px;">pill</div></div>
<div style="width:1px;height:64px;background:var(--color-border);margin:0 6px;"></div>
<div style="width:90px;height:64px;background:var(--color-card);border-radius:14px;box-shadow:var(--shadow-sm);"></div>
<div style="width:90px;height:64px;background:var(--color-card);border-radius:14px;box-shadow:var(--shadow-md);"></div>
<div style="width:90px;height:64px;background:var(--color-card);border-radius:14px;box-shadow:var(--shadow-lg);"></div>
</div></body></html>
