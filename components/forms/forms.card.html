<!-- @dsCard group="Components" viewport="700x280" name="Forms — Input, Checkbox, Radio" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;background:var(--color-background);font-family:var(--font-sans);padding:24px;box-sizing:border-box;}</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head><body><div id="root"></div>
<script type="text/babel">
const DS = Object.values(window).find(v => v && v.Input && v.Checkbox) || window;
const { Input, Checkbox, Radio } = DS;
function Demo(){
  const [c,setC]=React.useState(true);const [r,setR]=React.useState('email');
  return <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:26,alignItems:'start'}}>
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <Input label="Full name" defaultValue="Jonno" />
      <Input label="Email" defaultValue="hello@carinyaparc.com.au" hint="Focus ring in eucalypt." />
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <Checkbox checked={c} onChange={setC} label="Volunteering" />
      <Checkbox checked={false} label="Tours & workshops" />
      <Radio checked={r==='email'} onChange={()=>setR('email')} label="Contact by email" />
      <Radio checked={r==='phone'} onChange={()=>setR('phone')} label="Contact by phone" />
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script></body></html>
