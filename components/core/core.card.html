<!-- @dsCard group="Components" viewport="700x300" name="Core — Button, Tag, Card, Badge" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;background:var(--color-background);font-family:var(--font-sans);padding:24px;box-sizing:border-box;}</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
</head><body><div id="root"></div>
<script type="text/babel">
const DS = Object.values(window).find(v => v && v.Button && v.Card) || window;
const { Button, Tag, Card, Badge } = DS;
ReactDOM.createRoot(document.getElementById('root')).render(
  <div style={{display:'flex',flexDirection:'column',gap:20}}>
    <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'center'}}>
      <Button variant="primary">Primary</Button>
      <Button variant="secondary">Secondary</Button>
      <Button variant="outline">Outline</Button>
      <Button variant="ghost">Ghost →</Button>
      <Button variant="primary" disabled>Disabled</Button>
    </div>
    <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
      <Tag tone="eucalypt">Regeneration</Tag><Tag tone="kangaroo">Workshops</Tag>
      <Tag tone="bracken">Eco-stays</Tag><Tag tone="branch">Waterways</Tag><Tag tone="outline">Draft</Tag>
      <Badge tone="success">Complete</Badge><Badge tone="warning" dot>In progress</Badge>
    </div>
    <Card kicker="Journal" title="Why we planted 30,000 trees"
      footer={<Button variant="ghost">Read more →</Button>} style={{maxWidth:360}}>
      Notes from a season restoring the Branch River frontage.
    </Card>
  </div>
);
</script></body></html>
